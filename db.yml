services:
  db:
    image: postgres:15-alpine
    container_name: auth_db
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth
    ports:
      - "5433:5432"
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student -d auth"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  auth_pg_data:
# ~/go/bin/migrate -path migrations -database "postgres://student:password@localhost:5432/auth?sslmode=disable" up